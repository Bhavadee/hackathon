services:
  db:
    image: pgvector/pgvector:pg17-bookworm
    environment:
      POSTGRES_DB: taas
      POSTGRES_USER: taas
      POSTGRES_PASSWORD: taas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taas -d taas"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql://taas:taas@db:5432/taas
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
